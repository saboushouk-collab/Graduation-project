<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KGL Login</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-box">

<div class="logo">KGL</div>

<h2>Welcome</h2>

<label>Username</label>

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login to System</button>

<p>Karibu Groceries POS v1.0</p>

</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script src="script.js"></script>

<script src="components/Inventory.js"></script>
<script src="components/Sales.js"></script>

</body>
</html>
